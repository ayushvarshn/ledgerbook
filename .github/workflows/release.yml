name: Release desktop installers

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip AppleScript-based DMG styling in CI to avoid "AppleEvent timed out (-1712)" on macOS
          TAURI_BUNDLER_DMG_IGNORE_CI: false
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: Lending Ledger ${{ github.ref_name }}
          releaseBody: |
            Download the installer for your OS from the Assets section below.
          releaseDraft: true
          prerelease: false
          args: --verbose

